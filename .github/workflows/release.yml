name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    env:
      GH_TOKEN: ${{ github.token }}
      ANOVABAR_APPLE_ID: ${{ secrets.ANOVABAR_APPLE_ID }}
      ANOVABAR_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.ANOVABAR_APPLE_APP_SPECIFIC_PASSWORD }}
      ANOVABAR_APPLE_TEAM_ID: ${{ secrets.ANOVABAR_APPLE_TEAM_ID }}
      ANOVABAR_CODESIGN_IDENTITY: ${{ secrets.ANOVABAR_CODESIGN_IDENTITY }}
      ANOVABAR_MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.ANOVABAR_MACOS_CERTIFICATE_P12_BASE64 }}
      ANOVABAR_MACOS_CERTIFICATE_PASSWORD: ${{ secrets.ANOVABAR_MACOS_CERTIFICATE_PASSWORD }}
      TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Derive release version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "ANOVABAR_RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Check tap token
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "missing HOMEBREW_TAP_TOKEN secret" >&2
            exit 1
          fi

      - name: Determine release signing mode
        run: |
          missing=()
          for required_var in \
            ANOVABAR_APPLE_ID \
            ANOVABAR_APPLE_APP_SPECIFIC_PASSWORD \
            ANOVABAR_APPLE_TEAM_ID \
            ANOVABAR_CODESIGN_IDENTITY \
            ANOVABAR_MACOS_CERTIFICATE_P12_BASE64 \
            ANOVABAR_MACOS_CERTIFICATE_PASSWORD
          do
            if [[ -z "${!required_var:-}" ]]; then
              missing+=("$required_var")
            fi
          done

          if (( ${#missing[@]} == 0 )); then
            echo "ANOVABAR_RELEASE_SIGNING_MODE=signed" >> "$GITHUB_ENV"
            echo "ANOVABAR_RELEASE_SECURITY_LABEL=signed and notarized" >> "$GITHUB_ENV"
            echo "Release mode: signed and notarized" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ANOVABAR_RELEASE_SIGNING_MODE=unsigned" >> "$GITHUB_ENV"
            echo "ANOVABAR_RELEASE_SECURITY_LABEL=unsigned (ad hoc signed, not notarized)" >> "$GITHUB_ENV"
            {
              echo "Release mode: unsigned"
              echo
              echo "Missing Apple signing secrets:"
              printf -- "- %s\n" "${missing[@]}"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Check version files
        run: ./scripts/sync-version.sh --check "$ANOVABAR_RELEASE_VERSION"

      - name: Run Rust tests
        run: cargo test

      - name: Run Swift tests
        run: swift test --package-path macos/AnovaBar

      - name: Import Developer ID certificate
        if: env.ANOVABAR_RELEASE_SIGNING_MODE == 'signed'
        env:
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          CERT_PATH="$RUNNER_TEMP/anovabar-signing-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/anovabar-signing.keychain-db"

          echo "$ANOVABAR_MACOS_CERTIFICATE_P12_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$ANOVABAR_MACOS_CERTIFICATE_PASSWORD" \
            -A \
            -f pkcs12 \
            -t cert
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          CURRENT_KEYCHAINS="$(security list-keychains -d user | tr -d '"')"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $CURRENT_KEYCHAINS
          echo "ANOVABAR_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build app bundles
        run: |
          ./macos/build-menubar-app.sh
          ./macos/build-cli-app.sh

      - name: Notarize macOS app bundles
        if: env.ANOVABAR_RELEASE_SIGNING_MODE == 'signed'
        run: ./scripts/notarize-macos-apps.sh

      - name: Package release assets
        run: ./scripts/package-release.sh --skip-build

      - name: Write release notes
        run: |
          printf '%s\n' \
            "AnovaBar ${ANOVABAR_RELEASE_VERSION}" \
            "" \
            "Assets:" \
            "- \`AnovaBar.app.zip\`: menu bar app bundle" \
            "- \`anovabar-cli-macos.zip\`: CLI launcher plus \`AnovaBarCLI.app\`" \
            "- \`SHA256SUMS.txt\`: SHA-256 checksums for both archives" \
            "" \
            "Install:" \
            "- Menu bar app: download \`AnovaBar.app.zip\`, unzip it, and move \`AnovaBar.app\` to \`/Applications\`" \
            "- CLI: download \`anovabar-cli-macos.zip\`, unzip it, keep \`anovabar\` next to \`AnovaBarCLI.app\`, and run \`./anovabar --help\`" \
            > dist/release/RELEASE_NOTES.md

          if [[ "$ANOVABAR_RELEASE_SIGNING_MODE" == "signed" ]]; then
            printf '%s\n' \
              "" \
              "Release status:" \
              "- These macOS artifacts are signed with Developer ID and notarized." \
              >> dist/release/RELEASE_NOTES.md
          else
            printf '%s\n' \
              "" \
              "Release status:" \
              "- These macOS artifacts are unsigned for public distribution and are not notarized." \
              "- macOS may warn or block them on first launch." \
              "" \
              "Unsigned install notes:" \
              "- For \`AnovaBar.app\`, right-click the app and choose \`Open\`, or use Privacy & Security -> Open Anyway after a blocked launch." \
              "- For the CLI bundle, keep \`anovabar\` next to \`AnovaBarCLI.app\`. If macOS blocks the app bundle, clear the quarantine attribute or open it once via Finder." \
              >> dist/release/RELEASE_NOTES.md
          fi

      - name: Publish GitHub release
        run: |
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" \
              dist/release/AnovaBar.app.zip \
              dist/release/anovabar-cli-macos.zip \
              dist/release/SHA256SUMS.txt \
              --clobber
            gh release edit "$GITHUB_REF_NAME" \
              --draft=false \
              --title "$GITHUB_REF_NAME" \
              --notes-file dist/release/RELEASE_NOTES.md
          else
            gh release create "$GITHUB_REF_NAME" \
              dist/release/AnovaBar.app.zip \
              dist/release/anovabar-cli-macos.zip \
              dist/release/SHA256SUMS.txt \
              --title "$GITHUB_REF_NAME" \
              --notes-file dist/release/RELEASE_NOTES.md
          fi

      - name: Check out Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: gumadeiras/homebrew-tap
          token: ${{ env.TAP_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula
        run: |
          source_url="https://github.com/gumadeiras/anovabar/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          tmp="$(mktemp)"
          curl -fsSL "$source_url" -o "$tmp"
          sha256="$(shasum -a 256 "$tmp" | awk '{print $1}')"
          rm -f "$tmp"

          python homebrew-tap/scripts/update_formula.py \
            --formula homebrew-tap/Formula/anovabar.rb \
            --url "$source_url" \
            --sha256 "$sha256"

      - name: Commit and push formula
        working-directory: homebrew-tap
        run: |
          if git diff --quiet -- Formula/anovabar.rb; then
            echo "Formula/anovabar.rb already up to date"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/anovabar.rb
          git commit -m "Update anovabar to ${ANOVABAR_RELEASE_VERSION}"
          git push

      - name: Delete temporary keychain
        if: always()
        run: |
          if [[ -n "${ANOVABAR_KEYCHAIN_PATH:-}" && -f "${ANOVABAR_KEYCHAIN_PATH:-}" ]]; then
            security delete-keychain "$ANOVABAR_KEYCHAIN_PATH"
          fi
